name: Build macOS Executable with Spec

on:
  push:
    branches: [ "macOS" ]

env:
  APP_NAME: PrimaryStock
  Version: 1.0.1

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'   # バージョンは変更可
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller using spec file
      run: |
        : # または、直接ビルド
        pyinstaller "${APP_NAME}".py -n "${APP_NAME}-macOS-v-${VERSION}"

    - name: Create DMG Installer
      run: |
        brew install create-dmg
        mkdir dmg_source
        create-dmg \
          --volname "${APP_NAME}-macOS-v-${VERSION} Installer" \
          --app-drop-link 350 120 \
          --filesystem "APFS" \
          "${APP_NAME}-macOS-v-${VERSION}.dmg" \
          dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: "${{ env.APP_NAME }}-macOS-v-${{ env.VERSION }}"
        path: "${{ env.APP_NAME }}-macOS-v-${{ env.VERSION }}.dmg"